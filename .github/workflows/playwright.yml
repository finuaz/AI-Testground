name: Playwright Tests for AI Testground

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      run-tests:
        description: "Run AI tests"
        required: true
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    env:
      PROVIDER: ollama
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_MODEL: "gemma3:1b"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --- Format Check and Lint Steps ---
      # - name: Format check
      #   run: npm run format:check

      # - name: Lint code
      #   run: |
      #     echo "::notice::Running static code analysis"
      #     npm run lint

      # --- Playwright Test Steps ---
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps

      - name: Install zstd
        run: |
          apt-get update
          apt-get install -y zstd
          
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ runner.os }}-${{ env.OLLAMA_MODEL }}

      - run: ollama list

      - name: Pull model
        run: |
          ollama pull $OLLAMA_MODEL

      - name: Run tests
        run: |
          echo "::notice::Running Playwright tests"
          npm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
